<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI-Driven Transformer Load Optimizer</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Custom Styling -->
    <style>
        body {
            background-color: #f8f9fa;
        }

        .chart-container {
            position: relative;
            height: 400px;
            width: 100%;
        }

        .metric-card {
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            border-radius: 8px;
        }

        .header-title {
            font-weight: 600;
        }
    </style>

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container py-4">

    <!-- Title -->
    <h1 class="text-center mb-4 header-title">
        ⚡ AI-Driven Transformer Load Optimization System
    </h1>

    <!-- Run Button -->
    <div class="d-flex justify-content-center mb-4">
        <button id="runBtn" class="btn btn-primary btn-lg px-4">
            Run Simulation
        </button>
    </div>

    <!-- Status Section -->
    <div id="statusSection" class="mb-4 text-center"></div>

    <!-- Metrics Section -->
    <div id="metricsSection" class="row g-3 mb-4"></div>

    <!-- Chart Section -->
    <div class="card p-4 mb-4">
        <h5 class="text-center mb-3">24-Hour Load Analysis</h5>
        <div class="chart-container">
            <canvas id="loadChart"></canvas>
        </div>
    </div>

    <!-- Zone Allocation Table -->
    <div class="card p-4">
        <h5 class="mb-3">Zone Allocation Details</h5>
        <div class="table-responsive">
            <table class="table table-bordered table-hover" id="zoneTable">
                <thead class="table-light">
                    <tr>
                        <th>Hour</th>
                        <th>Hospital</th>
                        <th>Residential</th>
                        <th>Commercial</th>
                        <th>EV Charging</th>
                        <th>Total</th>
                        <th>Overloaded?</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Your Script -->
<script src="script.js"></script>

</body>
</html>
